spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=Oracle
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.milo.prac.commoncode.dto
  configuration:
    map-underscore-to-camel-case: true

server:
    port: ${PORT:8080}